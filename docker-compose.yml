services:
  csp-agent:
    build: .
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - BROWSER_ENDPOINT=${BROWSER_ENDPOINT}
    volumes:
      - .:/workspace
      - ./pi-home:/home/piuser
      - ./config/models.json:/home/piuser/.pi/agent/models.json:ro
    stdin_open: true
    tty: true
