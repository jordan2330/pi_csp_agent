services:
  csp-agent:
    build: .
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL}
    volumes:
      - .:/workspace
      - pi-agent-home:/root/.pi/agent
      - ./config/models.json:/root/.pi/agent/models.json:ro
    stdin_open: true
    tty: true

volumes:
  pi-agent-home:
