services:
  csp-agent:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - HOME=/home/agent
    volumes:
      - .:/workspace
      - pi-agent-home:/home/agent/.pi/agent
      - ./config/models.json:/home/agent/.pi/agent/models.json:ro
    stdin_open: true
    tty: true

volumes:
  pi-agent-home:
